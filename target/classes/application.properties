server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/smart_agri_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Minimal 32 karakter agar aman untuk HS256. Ganti sebelum deployment.
app.jwt.secret=smart-agri-secret-key-minimum-32-characters-change-me-now
app.jwt.expiration=86400000
